<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MIMIS.dev</title>
    
    <!-- Global Styles -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/global.css') }}">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
            background-color: var(--color-landing-cream);
        }

        body {
            font-family: var(--font-system);
            overflow-x: hidden;
            background-color: var(--color-landing-cream);
        }

        .section {
            width: 100%;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: var(--spacing-xl);
        }

        .section-1 {
            background-color: var(--color-landing-purple);
            align-items: flex-start;
            padding-top: calc(var(--spacing-xl) * 2);
        }

        .section-2 {
            background-color: var(--color-landing-cream);
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .section-content {
            text-align: center;
            max-width: 600px;
        }

        .title-wrapper {
            margin-bottom: var(--spacing-lg);
        }

        .ask-prefix {
            font-family: var(--font-title);
            font-size: clamp(25px, 5vw, 45px);
            color: var(--color-landing-cream);
            letter-spacing: 2px;
            line-height: 1.4;
            text-align: left;
            margin-bottom: var(--spacing-sm);
            opacity: 0;
        }

        h1 {
            font-family: var(--font-title);
            font-size: clamp(64px, 12vw, 120px);
            color: var(--color-landing-cream);
            margin: 0;
            line-height: .5;
            text-align: center;
            margin-bottom: var(--spacing-sm);
        }

        .dev-suffix {
            font-family: var(--font-title);
            font-size: clamp(25px, 6vw, 60px);
            display: block;
            text-align: right;
            color: var(--color-landing-cream);
        }

        /* Mimir Image - Fixed Overlay */
        .mimir-container {
            position: absolute;
            top: 130%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 50;
            pointer-events: auto;
        }

        .mimir-image {
            width: clamp(180px, 32vw, 550px);
            height: auto;
            display: block;
            filter: drop-shadow(0 15px 40px rgba(0, 0, 0, 0.3))
                    drop-shadow(0 5px 15px rgba(162, 96, 165, 0.3));
            animation: popUp 0.6s ease-out forwards;
        }

        /* Animations */
        @keyframes popUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes popDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .ask-prefix,
        h1,
        .dev-suffix,
        p {
            animation: popDown 0.6s ease-out forwards;
        }

        .ask-prefix {
            animation-delay: 0.1s;
        }

        h1 {
            animation-delay: 0.2s;
        }

        .dev-suffix {
            animation-delay: 0.3s;
        }

        p {
            animation-delay: 0.4s;
        }

        p {
            font-family: var(--font-text);
            font-size: clamp(18px, 4vw, 32px);
            color: var(--color-landing-cream);
            margin: var(--spacing-lg) 0 0 0;
        }

        .section-2 h1,
        .section-2 p {
            color: var(--color-landing-purple);
        }

        @media (max-width: 768px) {
            .section {
                padding: var(--spacing-lg);
            }

            .mimir-container {
                top: 60%;
            }

            .descriptive_text {
                flex-direction: column;
                width: auto;
            }
            
            .side-add-container {
                margin-top: 40px;
            }

            .side-container {
                display: flex;
                flex-direction: column;
                align-items: center;
                gap: 15px;
            }

            .ask-description,
            .add-description {
                position: relative !important;
                left: auto !important;
                right: auto !important;
                top: auto !important;
                transform: none !important;
                
            }

            .side-ask {
                position: static !important;
                margin-left: 0;
                margin-right: 0;
                margin-bottom: 20px;
                
                transform: none !important;
                transform-origin: center center;
                display: flex;
                flex-direction: column;
                font-size: clamp(32px, 8vw, 80px);
           
            }

            .side-add {
                position: static !important;
                left: auto;
                right: auto;
                margin-right: 0;
                margin-left: 0;
                margin-bottom: 20px;
                transform: none !important;
                transform-origin: center center;
                display: flex;
                flex-direction: column;
                font-size: clamp(32px, 8vw, 80px);
              
            }

            .section-2 {
                position: relative;
                flex-direction: column;
                justify-content: center;
                
            }

            .section-2 .btn {
                position: static;
                transform: none;
                justify-content: center;
                margin-top: 60px;
                
            }
        }

        /* Learn More Section */
        .learn-more {
            position: absolute;
            bottom: 40px;
            left: 250px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            font-family: var(--font-text);
            font-size: clamp(14px, 2.5vw, 35px);
            color: #ffeb3b;
            text-decoration: none;
            cursor: pointer;
            z-index: 10;
            transition: opacity 0.3s ease;
        }

        .learn-more:hover {
            opacity: 0.8;
        }

        .learn-more-arrow {
            font-size: clamp(20px, 4vw, 28px);
            animation: drawArrow 2.5s ease-in-out infinite;
            display: inline-block;
        }

        @keyframes drawArrow {
            0% {
                clip-path: inset(0 0 100% 0);
            }
            40% {
                clip-path: inset(0 0 0 0);
            }
            75% {
                clip-path: inset(0 0 0 0);
            }
            100% {
                clip-path: inset(0 0 100% 0);
            }
        }

        @keyframes oscillate {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(12px);
            }
        }

        /* Side "Ask" Text */
        .side-ask {
            position: absolute;
            left: 300px;
            top: 50%;
            transform: translateY(-50%);
            font-family: var(--font-text);
            font-size: clamp(24px, 6vw, 72px);
            color: var(--color-landing-purple);
            text-decoration: none;
            cursor: pointer;
            transition: text-decoration 0.3s ease;
            z-index: 15;
        }

        .side-ask:hover {
            text-decoration: underline;
        }

        /* Side "Add" Text */
        .side-add {
            position: absolute;
            right: 300px;
            top: 50%;
            transform: translateY(-50%);
            font-family: var(--font-text);
            font-size: clamp(24px, 6vw, 72px);
            color: var(--color-landing-purple);
            text-decoration: none;
            cursor: pointer;
            transition: text-decoration 0.3s ease;
            z-index: 15;
        }

        .side-add:hover {
            text-decoration: underline;
        }

        /* Begin Button - Higher Z-Index */
        .section-2 .btn {
            position: relative;
            z-index: 100;
            border: 5px solid black;
            background: var(--color-landing-purple) !important;
            color: var(--color-landing-cream);
            padding: 20px 60px;
            font-size: clamp(18px, 4vw, 42px);
            font-weight: 700;
        }

        .section-2 .btn:hover {
            background: #8d4d8f !important;
        }

        /* Description Popup */
        .description-popup {
            position: absolute;
            background-color: var(--color-landing-purple);
            color: var(--color-landing-cream);
            padding: clamp(10px, 2vw, 20px) clamp(15px, 3vw, 30px);
            border-radius: 8px;
            font-family: var(--font-text);
            font-size: clamp(14px, 3vw, 24px);
            width: clamp(150px, 30vw, 300px);
            text-align: center;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            z-index: 20;
        }

        .description-popup.show {
            opacity: 1;
            pointer-events: auto;
        }

        .ask-description {
            left: 300px;
            top: calc(50% + 80px);
            transform: translateX(-50%);
        }

        .add-description {
            right: 300px;
            top: calc(50% + 80px);
            transform: translateX(50%);
        }
    </style>
</head>
<body>

    <!-- Section 1: Purple -->
    <section class="section section-1">
        <div class="section-content">
            <div class="title-wrapper">
                <div class="ask-prefix">ask</div>
                <h1>MIMIS</h1>
                <div class="dev-suffix">.dev</div>
            </div>
        </div>

        <!-- Learn More -->
        <a class="learn-more" href="#section-2">
            <span>Learn More</span>
            <span class="learn-more-arrow">↓</span>
        </a>
    </section>

       <!-- Mimir Image - Overlay Both Sections -->
    <div class="mimir-container">
        <img src="{{ url_for('static', filename='images/Mimir_Head_LongBeard.png') }}" 
             alt="MIMIS Logo" 
             class="mimir-image">
    </div>


    <!-- Section 2: Cream - Button Only -->
    <section class="section section-2">
        <div class="descriptive_text">
            <!-- Side Ask Container -->
            <div class="side-container side-ask-container">
                <span class="side-ask" onclick="toggleDescription('ask')">Add</span>
                <div class="description-popup ask-description" id="ask-desc">Store job postings in a database for analysis.</div>
            </div>

            <!-- Side Add Container -->
            <div class="side-container side-add-container">
                <span class="side-add" onclick="toggleDescription('add')">Ask</span>
                <div class="description-popup add-description" id="add-desc">Query your postings for insights and trends.</div>
            </div>
        </div>
        <a href="{{ url_for('jobs') }}" class="btn btn-primary">
            Begin
        </a>
    </section>

    <script>
        function toggleDescription(type) {
            const askDesc = document.getElementById('ask-desc');
            const addDesc = document.getElementById('add-desc');
            
            if (type === 'ask') {
                askDesc.classList.toggle('show');
                addDesc.classList.remove('show');
            } else if (type === 'add') {
                addDesc.classList.toggle('show');
                askDesc.classList.remove('show');
            }
        }
    </script>
</body>
</html>
