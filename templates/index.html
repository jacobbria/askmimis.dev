<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MIMIS.dev</title>
    
    <!-- Global Styles -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/global.css') }}">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
            background-color: var(--color-landing-cream);
        }

        body {
            font-family: var(--font-system);
            overflow-x: hidden;
            background-color: var(--color-landing-cream);
        }

        .section {
            width: 100%;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: var(--spacing-xl);
        }

        .section-1 {
            background-color: var(--color-landing-purple);
            align-items: flex-start;
            padding-top: calc(var(--spacing-xl) * 2);
        }

        .section-2 {
            background-color: var(--color-landing-cream);
            align-items: center;
            justify-content: center;
        }

        .section-content {
            text-align: center;
            max-width: 600px;
        }

        .title-wrapper {
            margin-bottom: var(--spacing-lg);
        }

        .ask-prefix {
            font-family: var(--font-title);
            font-size: clamp(25px, 5vw, 45px);
            color: var(--color-landing-cream);
            letter-spacing: 2px;
            line-height: 1.4;
            text-align: left;
            margin-bottom: var(--spacing-sm);
            opacity: 0;
        }

        h1 {
            font-family: var(--font-title);
            font-size: clamp(64px, 12vw, 120px);
            color: var(--color-landing-cream);
            margin: 0;
            line-height: .5;
            text-align: center;
            margin-bottom: var(--spacing-sm);
        }

        .dev-suffix {
            font-family: var(--font-title);
            font-size: clamp(25px, 6vw, 60px);
            display: block;
            text-align: right;
            color: var(--color-landing-cream);
        }

        /* Mimir Image - Fixed Overlay */
        .mimir-container {
            position: absolute;
            top: 130%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 50;
            pointer-events: auto;
        }

        .mimir-image {
            width: clamp(180px, 32vw, 360px);
            height: auto;
            display: block;
            filter: drop-shadow(0 15px 40px rgba(0, 0, 0, 0.3))
                    drop-shadow(0 5px 15px rgba(162, 96, 165, 0.3));
            animation: popUp 0.6s ease-out forwards;
        }

        /* Animations */
        @keyframes popUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes popDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .ask-prefix,
        h1,
        .dev-suffix,
        p {
            animation: popDown 0.6s ease-out forwards;
        }

        .ask-prefix {
            animation-delay: 0.1s;
        }

        h1 {
            animation-delay: 0.2s;
        }

        .dev-suffix {
            animation-delay: 0.3s;
        }

        p {
            animation-delay: 0.4s;
        }

        p {
            font-family: var(--font-text);
            font-size: clamp(18px, 4vw, 32px);
            color: var(--color-landing-cream);
            margin: var(--spacing-lg) 0 0 0;
        }

        .section-2 h1,
        .section-2 p {
            color: var(--color-landing-purple);
        }

        @media (max-width: 768px) {
            .section {
                padding: var(--spacing-lg);
            }
        }

        /* Begin Button - Higher Z-Index */
        .section-2 .btn {
            position: relative;
            z-index: 100;
            margin-bottom: 60px;
            border: 5px solid black;
        }
    </style>
</head>
<body>

    <!-- Section 1: Purple -->
    <section class="section section-1">
        <div class="section-content">
            <div class="title-wrapper">
                <div class="ask-prefix">ask</div>
                <h1>MIMIS</h1>
                <div class="dev-suffix">.dev</div>
            </div>
        </div>
    </section>

       <!-- Mimir Image - Overlay Both Sections -->
    <div class="mimir-container">
        <img src="{{ url_for('static', filename='images/Mimir_Head_LongBeard.png') }}" 
             alt="MIMIS Logo" 
             class="mimir-image">
    </div>


    <!-- Section 2: Cream - Button Only -->
    <section class="section section-2">
        <a href="{{ url_for('jobs') }}" class="btn btn-primary">
            Begin
        </a>
    </section>
</body>
</html>
