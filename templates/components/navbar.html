<!-- Navigation Bar Component -->
<nav class="navbar">
    <div class="burger-icon" id="burgerIcon" onclick="toggleBurgerMenu()">
        <span class="burger-line"></span>
        <span class="burger-line"></span>
        <span class="burger-line"></span>
    </div>
    
    <div class="burger-menu" id="burgerMenu">
        <div class="burger-menu-items" id="burgerMenuItems">
            <a href="/" class="burger-menu-link" onclick="closeBurgerMenu()">Home</a>
            
                <a href="/jobs/add" class="burger-menu-link" onclick="closeBurgerMenu()">Add</a>
                <a href="/jobs" class="burger-menu-link" onclick="closeBurgerMenu()">Ask</a>
            {% if is_authenticated %}
                <a href="/auth/logout" class="burger-menu-link" onclick="closeBurgerMenu()">Logout</a>
            {% else %}
                <a href="/login" class="burger-menu-link" onclick="closeBurgerMenu()">Login</a>
            {% endif %}
        </div>
    </div>
</nav>

<style>
    .navbar {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 1000;
        background: transparent;
    }

    .burger-icon {
        position: fixed;
        top: 20px;
        left: 20px;
        width: 40px;
        height: 40px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        cursor: pointer;
        z-index: 1001;
    }

    .burger-line {
        width: 28px;
        height: 3px;
        background-color: #000000;
        margin: 4px 0;
        transition: all 0.3s ease;
        border-radius: 2px;
    }

    .burger-icon.rotated .burger-line {
        background-color: #000000;
    }

    .burger-icon.rotated .burger-line:nth-child(1) {
        transform: rotate(45deg) translate(12px, 12px);
    }

    .burger-icon.rotated .burger-line:nth-child(2) {
        opacity: 0;
    }

    .burger-icon.rotated .burger-line:nth-child(3) {
        transform: rotate(-45deg) translate(11px, -11px);
    }

    .burger-menu {
        position: fixed;
        top: 0;
        left: 0;
        width: 300px;
        height: 100vh;
        background: white;
        box-shadow: 2px 0 10px rgba(0, 0, 0, 0.1);
        z-index: 999;
        transform: translateX(-100%);
        transition: transform 0.3s ease;
    }

    .burger-menu.open {
        transform: translateX(0);
    }

    .burger-menu-items {
        display: flex;
        flex-direction: column;
        padding-top: 80px;
        width: 100%;
    }

    .burger-menu-link {
        padding: 16px 24px;
        font-size: 18px;
        font-family: var(--font-text);
        color: var(--color-text-dark);
        text-decoration: none;
        transition: all 0.2s ease;
        border-left: 4px solid transparent;
    }

    .burger-menu-link:hover {
        background-color: var(--color-landing-cream);
        border-left-color: var(--color-landing-purple);
        color: var(--color-landing-purple);
    }

    /* Overlay to close menu on click outside */
    .burger-overlay {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: rgba(0, 0, 0, 0.3);
        opacity: 0;
        visibility: hidden;
        transition: all 0.3s ease;
        z-index: 998;
    }

    .burger-overlay.open {
        opacity: 1;
        visibility: visible;
    }
</style>

<script>
    // Create overlay for closing menu on click outside
    function initBurgerMenu() {
        let overlay = document.getElementById('burgerOverlay');
        if (!overlay) {
            overlay = document.createElement('div');
            overlay.id = 'burgerOverlay';
            overlay.className = 'burger-overlay';
            document.body.appendChild(overlay);
            overlay.addEventListener('click', closeBurgerMenu);
        }
    }

    function toggleBurgerMenu() {
        const burgerIcon = document.getElementById('burgerIcon');
        const burgerMenu = document.getElementById('burgerMenu');
        const overlay = document.getElementById('burgerOverlay');

        if (burgerIcon && burgerMenu) {
            burgerIcon.classList.toggle('rotated');
            burgerMenu.classList.toggle('open');
            if (overlay) {
                overlay.classList.toggle('open');
            }
        }
    }

    function closeBurgerMenu() {
        const burgerIcon = document.getElementById('burgerIcon');
        const burgerMenu = document.getElementById('burgerMenu');
        const overlay = document.getElementById('burgerOverlay');

        if (burgerIcon && burgerMenu) {
            burgerIcon.classList.remove('rotated');
            burgerMenu.classList.remove('open');
            if (overlay) {
                overlay.classList.remove('open');
            }
        }
    }

    // Initialize burger menu when DOM is ready
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', initBurgerMenu);
    } else {
        initBurgerMenu();
    }

    // Close menu when clicking outside
    document.addEventListener('click', function(event) {
        const burgerIcon = document.getElementById('burgerIcon');
        const burgerMenu = document.getElementById('burgerMenu');
        
        if (burgerIcon && burgerMenu && 
            !burgerIcon.contains(event.target) && 
            !burgerMenu.contains(event.target)) {
            closeBurgerMenu();
        }
    });
</script>
