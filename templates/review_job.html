<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Job - askMimis</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/global.css') }}">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--color-landing-purple);
            min-height: 100vh;
            font-family: var(--font-text);
        }

        .page-wrapper {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            padding: 20px;
        }

        .content {
            flex: 1;
            max-width: 900px;
            margin: 0 auto;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 40px;
        }

        /* Title Section */
        .title-section {
            text-align: center;
            margin-top: 40px;
        }

        .title-section h1 {
            font-family: var(--font-title);
            font-size: 48px;
            color: white;
            font-weight: bold;
        }

        /* Input Section */
        .input-section {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-group label {
            color: white;
            font-size: 14px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-group input,
        .form-group textarea {
            padding: 14px 16px;
            border: none;
            border-radius: 8px;
            font-family: var(--font-text);
            font-size: 16px;
            background: white;
            color: var(--color-text-dark);
            transition: all 0.2s ease;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.3);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 120px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .form-row.full {
            grid-template-columns: 1fr;
        }

        /* Button Section */
        .button-section {
            display: flex;
            justify-content: flex-end;
            gap: 16px;
            margin-top: 20px;
        }

        .btn {
            padding: 12px 36px;
            border: none;
            border-radius: 6px;
            font-family: var(--font-text);
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-save {
            background: var(--gradient-primary);
            color: white;
        }

        .btn-save:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-cancel {
            background: white;
            color: var(--color-landing-purple);
            border: 2px solid white;
        }

        .btn-cancel:hover {
            background: rgba(255, 255, 255, 0.9);
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .title-section h1 {
                font-size: 36px;
            }

            .form-row {
                grid-template-columns: 1fr;
            }

            .button-section {
                flex-direction: column-reverse;
                gap: 12px;
            }

            .btn {
                width: 100%;
            }

            .content {
                gap: 30px;
            }
        }

        @media (max-width: 480px) {
            .title-section h1 {
                font-size: 28px;
            }

            .page-wrapper {
                padding: 16px;
            }

            .content {
                gap: 24px;
            }

            .form-group input,
            .form-group textarea {
                padding: 12px 14px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
{% include 'components/navbar.html' %}

<div class="page-wrapper">
    <div class="content">
        <!-- Title Section -->
        <div class="title-section">
            <h1>EDIT A JOB</h1>
        </div>

        <!-- Input Section -->
        <div class="input-section">
            <form id="editJobForm">
                <div class="form-row full">
                    <div class="form-group">
                        <label for="title">Job Title</label>
                        <input 
                            type="text" 
                            id="title" 
                            name="title" 
                            placeholder="Enter job title..."
                            required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="company">Company</label>
                        <input 
                            type="text" 
                            id="company" 
                            name="company" 
                            placeholder="Enter company name..."
                            required>
                    </div>

                    <div class="form-group">
                        <label for="location">Location</label>
                        <input 
                            type="text" 
                            id="location" 
                            name="location" 
                            placeholder="Enter location..."
                            required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="pay">Salary/Pay</label>
                        <input 
                            type="text" 
                            id="pay" 
                            name="pay" 
                            placeholder="Enter salary range...">
                    </div>

                    <div class="form-group">
                        <label for="skills">Required Skills</label>
                        <input 
                            type="text" 
                            id="skills" 
                            name="skills" 
                            placeholder="Enter required skills...">
                    </div>
                </div>

                <div class="form-row full">
                    <div class="form-group">
                        <label for="description">Job Description</label>
                        <textarea 
                            id="description" 
                            name="description" 
                            placeholder="Enter job description..."></textarea>
                    </div>
                </div>

                <!-- Button Section -->
                <div class="button-section">
                    {% set button_text = 'CANCEL' %}
                    {% set button_href = '/' %}
                    {% set button_size = 'medium' %}
                    {% include 'components/standard_button.html' %}
                    <button type="submit" class="btn btn-medium btn-save">SAVE</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
    // Load data from sessionStorage on page load
    document.addEventListener('DOMContentLoaded', function() {
        const jobDataStr = sessionStorage.getItem('parsedJobData');
        
        if (jobDataStr) {
            try {
                const jobData = JSON.parse(jobDataStr);
                populateForm(jobData);
            } catch (e) {
                console.error('Error parsing job data from sessionStorage:', e);
            }
        }
    });

    function populateForm(jobData) {
        if (jobData.title) document.getElementById('title').value = jobData.title;
        if (jobData.company) document.getElementById('company').value = jobData.company;
        if (jobData.location) document.getElementById('location').value = jobData.location;
        if (jobData.pay) document.getElementById('pay').value = jobData.pay;
        if (jobData.skills) document.getElementById('skills').value = jobData.skills;
        if (jobData.description) document.getElementById('description').value = jobData.description;
    }

    function cancelEdit() {
        window.location.href = '/';
    }

    // Handle form submission
    document.getElementById('editJobForm').addEventListener('submit', function(e) {
        e.preventDefault();

        const jobData = {
            title: document.getElementById('title').value.trim(),
            company: document.getElementById('company').value.trim(),
            location: document.getElementById('location').value.trim(),
            pay: document.getElementById('pay').value.trim(),
            skills: document.getElementById('skills').value.trim(),
            description: document.getElementById('description').value.trim()
        };

        // Validate required fields
        if (!jobData.title || !jobData.company || !jobData.location) {
            alert('Please fill in Title, Company, and Location fields.');
            return;
        }

        // Submit to backend
        fetch('/jobs/save', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
            },
            body: JSON.stringify(jobData)
        })
        .then(response => response.json())
        .then(data => {
            if (data.success) {
                alert('Job saved successfully!');
                window.location.href = '/jobs';
            } else {
                alert('Error saving job: ' + (data.message || 'Unknown error'));
            }
        })
        .catch(error => {
            console.error('Error:', error);
            alert('Error saving job. Please try again.');
        });
    });
</script>
</body>
</html>
